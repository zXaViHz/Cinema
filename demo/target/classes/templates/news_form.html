<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[[${pageTitle}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #1c1c1c;
            color: white;
        }
        .container {
            background-color: #343a40;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            max-width: 500px;
            margin: 50px auto;
        }
        h2 {
            text-align: center;
            color: #f8f9fa;
        }
        .form-group label {
            font-weight: bold;
            color: white;
        }
        .form-control {
            background-color: #333;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            transition: background-color 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }
        .error-message {
            color: red;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>[[${pageTitle}]]</h2>
        <form th:action="@{/news/save}" method="post" th:object="${news}" enctype="multipart/form-data" onsubmit="return validateForm()">
            <input type="hidden" th:field="*{newsID}">
            
            <div class="form-group mb-3">
                <label for="authorID">Author ID</label>
                <input type="number" th:field="*{authorID}" class="form-control required-field" id="authorID" required />
                <span class="error-message" id="error-authorID">Author ID không được để trống!</span>
            </div>
            
            <div class="form-group mb-3">
                <label for="movieID">Movie ID</label>
                <input type="number" th:field="*{movieID}" class="form-control required-field" id="movieID" required />
                <span class="error-message" id="error-movieID">Movie ID không được để trống!</span>
            </div>
            
            <div class="form-group mb-3">
                <label for="title">Title</label>
                <input type="text" th:field="*{title}" class="form-control required-field" id="title" required minlength="2" maxlength="50"/>
                <span class="error-message" id="error-title">Title phải từ 2-50 ký tự!</span>
            </div>
            
            <div class="form-group mb-3">
                <label for="content">Content</label>
                <textarea th:field="*{content}" class="form-control required-field" id="content" required minlength="4" rows="4"></textarea>
                <span class="error-message" id="error-content">Content phải có ít nhất 4 ký tự!</span>
            </div>
            
            <div class="form-group row mb-3">
                <label class="col-sm-4 col-form-label">Photo</label>
                <div class="col-sm-8">
                    <input type="file" name="image" accept="image/png, image/jpeg" class="form-control required-field" id="image"/>
                    <span class="error-message" id="error-image">Chỉ chấp nhận file JPG hoặc PNG!</span>
                </div>
            </div>
            
            <div class="text-center">
                <button type="submit" id="saveButton" class="btn btn-primary m-2" disabled>Save</button>
                <button type="button" class="btn btn-secondary m-2" onclick="cancelForm()">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        function cancelForm() {
            window.location.href = "/news";
        }

        function validateFields() {
            let inputs = document.querySelectorAll(".required-field");
            let saveButton = document.getElementById("saveButton");
            let allValid = true;

            inputs.forEach(input => {
                let errorMsg = input.nextElementSibling;
                if (!input.value.trim()) {
                    errorMsg.style.display = "block";
                    input.classList.add("invalid");
                    allValid = false;
                } else {
                    errorMsg.style.display = "none";
                    input.classList.remove("invalid");
                }
            });

            return allValid;
        }

        function validateTitle() {
            let titleInput = document.getElementById("title");
            let titleError = document.getElementById("error-title");

            if (titleInput.value.length < 2 || titleInput.value.length > 50) {
                titleError.style.display = "block";
                return false;
            } else {
                titleError.style.display = "none";
                return true;
            }
        }

        function validateContent() {
            let contentInput = document.getElementById("content");
            let contentError = document.getElementById("error-content");

            if (contentInput.value.length < 4) {
                contentError.style.display = "block";
                return false;
            } else {
                contentError.style.display = "none";
                return true;
            }
        }

        function validateImage() {
            let imageInput = document.getElementById("image");
            let imageError = document.getElementById("error-image");
            let file = imageInput.files[0];

            if (file) {
                let fileType = file.type;
                if (fileType !== "image/png" && fileType !== "image/jpeg") {
                    imageError.style.display = "block";
                    return false;
                }
            }
            imageError.style.display = "none";
            return true;
        }

        function validateForm() {
            let validFields = validateFields();
            let validTitle = validateTitle();
            let validContent = validateContent();
            let validImage = validateImage();

            let allValid = validFields && validTitle && validContent && validImage;

            document.getElementById("saveButton").disabled = !allValid;
            return allValid;
        }

        // Kiểm tra lại khi trang tải
        window.onload = function () {
            setTimeout(validateForm, 100);
        };
    </script>
</body>
</html>
