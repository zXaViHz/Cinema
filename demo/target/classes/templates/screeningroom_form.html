<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Screening Room Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1c1c1c;
        }
        .form-container {
            background-color: #343a40;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            max-width: 500px;
            margin: auto;
            margin-top: 50px;
        }
        label { color: white; }
        input {
            background-color: #333;
            color: white;
            border: 1px solid white;
        }
        .error-message {
            color: red;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center" th:text="${pageTitle}">Screening Room Form</h2>
            <form th:action="@{/screeningroom/save}" method="post" th:object="${screeningroom}" onsubmit="return validateForm()">
                <input type="hidden" th:field="*{ScreeningRoomID}">

                <div class="mb-3">
                    <label>Theater ID:</label>
                    <input type="number" th:field="*{theater.TheaterID}" class="form-control required-field" required oninput="checkAllFields()" />
                    <span class="error-message">Vui lòng nhập Theater ID</span>
                </div>

                <div class="mb-3">
                    <label>Room Name:</label>
                    <input type="text" th:field="*{Roomname}" class="form-control required-field" required oninput="checkAllFields()" />
                    <span class="error-message">Vui lòng nhập Room Name</span>
                </div>

                <div class="text-center">
                    <button type="submit" id="saveButton" class="btn btn-primary m-2" disabled>Save</button>
                    <button type="button" class="btn btn-secondary m-2" onclick="cancelForm()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function cancelForm() {
            window.location.href = "/screeningroom";
        }

        function checkAllFields() {
            let inputs = document.querySelectorAll(".required-field");
            let saveButton = document.getElementById("saveButton");
            let allValid = true;

            inputs.forEach(input => {
                let errorMsg = input.nextElementSibling;
                if (!input.value.trim()) {
                    errorMsg.style.display = "block";
                    input.classList.add("invalid");
                    allValid = false;
                } else {
                    errorMsg.style.display = "none";
                    input.classList.remove("invalid");
                }
            });

            saveButton.disabled = !allValid;
        }

        function validateForm() {
            checkAllFields();
            return !document.getElementById("saveButton").disabled;
        }

        window.onload = function () {
            setTimeout(checkAllFields, 100);
        };
    </script>
</body>
</html>
