<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        /* Custom CSS */
        html, body {
            background-image: url(https://user-images.githubusercontent.com/33485020/108069438-5ee79d80-7089-11eb-8264-08fdda7e0d11.jpg);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            margin: 0;
        }

        body {
            background-position: center;
            background-size: cover;
            min-height: 100vh;
            width: 100%;
            background-color: #032124;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .reset-form {
            width: 400px;
            height: 450px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            background-color: #032124;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .reset-form h2 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .reset-input {
            position: relative;
            margin: 15px 0;
            width: 310px;
            border-bottom: 2px solid white;
        }

        .reset-input label {
            color: white;
        }

        .reset-input input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
            padding: 10px 0;
        }

        .reset-button {
            width: 310px;
            height: 45px;
            background-color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: black;
            font-weight: 600;
            margin-top: 20px;
        }

        .reset-button:hover {
            background: #ddd;
        }

        .container-header {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .container-header .btn {
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="container-header">
        <a href="#" th:href="@{/login}" class="btn">Back</a>
    </div>
    <div class="reset-form">
        <h2>Reset Your Password</h2>
        <form th:action="@{/resetPassword}" method="post">
<input type="hidden" name="token" th:value="${token}" />
            <div class="reset-input">
                <label>Enter New Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <div class="reset-input">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required oninput="checkPasswordMatch(this);">
            </div>
            <button type="submit" class="reset-button">Change Password</button>
        </form>
    </div>
</div>
<script>
    function checkPasswordMatch(fieldConfirmPassword) {
        if (fieldConfirmPassword.value !== document.getElementById('password').value) {
            fieldConfirmPassword.setCustomValidity("Passwords do not match!");
        } else {
            fieldConfirmPassword.setCustomValidity("");
        }
    }
</script>
</body>
</html>
