<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        /* General styles */
        html, body {
            background-image: url(https://user-images.githubusercontent.com/33485020/108069438-5ee79d80-7089-11eb-8264-08fdda7e0d11.jpg);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            margin: 0;
        }

        body {
            background-position: center;
            background-size: cover;
            min-height: 100vh;
            width: 100%;
            background-color: #032124;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .forgot-password-form {
            position: relative;
            width: 400px;
            height: 350px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            background-color: #032124;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .forgot-password-form h2 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .forgot-input {
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
        }

        .forgot-input input {
            width: 85%;
            padding: 10px;
            border: 2px solid white;
            border-radius: 8px;
            background: transparent;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .forgot-input input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .send-button {
            width: 85%;
            height: 45px;
            background-color: white;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
            cursor: pointer;
            font-size: 16px;
            color: black;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .send-button:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        .container-header {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .container-header .btn {
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
.container-header .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="container-header">
        <a href="#" th:href="@{/login}" class="btn">Back</a>
    </div>
    <div class="forgot-password-form">
        <h2>Forgot Password</h2>
        <p style="color: white; text-align: center; margin-bottom: 20px;">
            We will send a reset password link to your email.
        </p>

        <form th:action="@{/forgotPassword}" method="post">
            <div class="forgot-input">
                <input type="email" name="email" placeholder="Enter your email" required autofocus>
            </div>
            <button type="submit" class="send-button">Send Reset Link</button>
        </form>
    </div>
</div>
</body>
</html>
