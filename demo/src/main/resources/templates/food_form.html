<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[[${pageTitle}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1c1c1c;
        }
        .container {
            background-color: #343a40;
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            max-width: 500px;
            margin: 50px auto;
        }
        h2 {
            text-align: center;
            color: #00bcd4;
        }
        .form-group label {
            font-weight: bold;
        }
        .form-control {
            background-color: #333;
            color: white;
            border: 1px solid white;
        }
        .form-control:focus {
            border-color: #00bcd4;
            box-shadow: 0 0 5px rgba(0, 188, 212, 0.5);
        }
        .btn-primary {
            background-color: #00bcd4;
            border-color: #00bcd4;
        }
        .btn-primary:hover {
            background-color: #008ba3;
        }
        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }
        .error-message {
            color: red;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>[[${pageTitle}]]</h2>
        <form th:action="@{/food/save}" method="post" th:object="${food}" enctype="multipart/form-data" onsubmit="return validateForm()">
            <input type="hidden" th:field="*{foodID}">

            <div class="mb-3">
                <label class="form-label">Food Name</label>
                <input type="text" id="foodName" th:field="*{foodName}" class="form-control required-field" required minlength="2" maxlength="45" placeholder="Enter food name"/>
                <div class="error-message">Food name is required (2-45 characters).</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" id="price" th:field="*{price}" class="form-control required-field" required min="0" step="0.01" placeholder="Enter price"/>
                <div class="error-message">Price must be a positive number.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Photo Food</label>
                <input type="file" name="image" accept="image/png, image/jpeg" class="form-control"/>
            </div>

            <div class="text-center">
                <button type="submit" id="saveButton" class="btn btn-primary px-4" disabled>Save</button>
                <button type="button" class="btn btn-secondary px-4" onclick="cancelForm()">Cancel</button>
            </div>
        </form>
    </div>
    
    <script>
        function cancelForm() {
            window.location.href = "/food";
        }

        function checkAllFields() {
            let inputs = document.querySelectorAll(".required-field");
            let saveButton = document.getElementById("saveButton");
            let allValid = true;

            inputs.forEach(input => {
                let errorMsg = input.nextElementSibling;
                if (!input.value.trim()) {
                    errorMsg.style.display = "block";
                    input.classList.add("invalid");
                    allValid = false;
                } else {
                    errorMsg.style.display = "none";
                    input.classList.remove("invalid");
                }
            });

            saveButton.disabled = !allValid;
        }

        function validateForm() {
            checkAllFields();
            return !document.getElementById("saveButton").disabled;
        }

        window.onload = function () {
            setTimeout(checkAllFields, 100);
        };
    </script>
</body>
</html>
