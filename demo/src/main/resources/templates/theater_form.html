<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[[${pageTitle}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body {
            background-color: #1c1c1c;
        }
        .form-container {
            background-color: #343a40;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            max-width: 500px;
            margin: auto;
            margin-top: 50px;
        }
        label { color: white; }
        input, textarea {
            background-color: #333;
            color: white;
            border: 1px solid white;
        }
        .error-message {
            color: red;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-center">[[${pageTitle}]]</h2>
        <form id="theaterForm" th:action="@{/theater/save}" method="post" th:object="${theater}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{theaterID}">

            <div class="mb-3">
                <label for="theaterName">Theater Name</label>
                <input type="text" th:field="*{theaterName}" class="form-control" id="theaterName" required minlength="2">
                <div class="error-message" id="error-theaterName">Vui lòng nhập tên rạp.</div>
            </div>

            <div class="mb-3">
                <label for="movieID">Movie IDs (cách nhau bằng dấu `;`)</label>
                <input type="text" th:field="*{movieID}" class="form-control" id="movieID" required>
                <div class="error-message" id="error-movieID">Vui lòng nhập ít nhất một Movie ID.</div>
            </div>

            <div class="mb-3">
                <label for="address">Address</label>
                <textarea th:field="*{address}" class="form-control" id="address" required rows="3"></textarea>
                <div class="error-message" id="error-address">Vui lòng nhập địa chỉ.</div>
            </div>

            <div class="mb-3">
                <label for="description">Description</label>
                <textarea th:field="*{description}" class="form-control" id="description" required rows="3"></textarea>
                <div class="error-message" id="error-description">Vui lòng nhập mô tả.</div>
            </div>

            <div class="mb-3">
                <label for="photoTheater">Photo</label>
                <input type="file" th:field="*{photoTheaterFile}" class="form-control" id="photoTheater">
            </div>

            <div class="mb-3">
                <label for="rating">Rating (0 - 10)</label>
                <input type="number" th:field="*{rating}" class="form-control" id="rating" required step="0.1" min="0" max="10">
                <div class="error-message" id="error-rating">Vui lòng nhập rating từ 0 đến 10.</div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        function cancelForm() {
            window.location.href = "/theater";
        }
    
        function validateRating() {
            let ratingInput = document.getElementById("rating");
            let ratingError = document.getElementById("error-rating");
            let ratingValue = parseFloat(ratingInput.value);
    
            if (isNaN(ratingValue) || ratingValue < 0 || ratingValue > 10) {
                ratingError.style.display = "block";
                ratingInput.classList.add("invalid");
                return false;
            } else {
                ratingError.style.display = "none";
                ratingInput.classList.remove("invalid");
                return true;
            }
        }
    
        function checkAllFields() {
            let inputs = document.querySelectorAll(".required-field");
            let saveButton = document.getElementById("saveButton");
            let allValid = true;
    
            inputs.forEach(input => {
                let errorMsg = input.nextElementSibling;
                if (!input.value.trim()) {
                    errorMsg.style.display = "block";
                    input.classList.add("invalid");
                    allValid = false;
                } else {
                    errorMsg.style.display = "none";
                    input.classList.remove("invalid");
                }
            });
    
            if (allValid && validateRating()) {
                saveButton.disabled = false;
            } else {
                saveButton.disabled = true;
            }
        }
    
        function validateForm() {
            checkAllFields();
            return !document.getElementById("saveButton").disabled;
        }
    
        // Kiểm tra lại khi trang tải
        window.onload = function () {
            setTimeout(checkAllFields, 100);
        };
    </script>
    
</body>
</html>
